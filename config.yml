data:
  directory: "./data"
  symbols:
    - "EURUSD"
    - "GBPUSD"
  years: [2020, 2021, 2022, 2023, 2024, 2025]
  file_pattern: "DAT_ASCII_{symbol}_M1_{year}.csv"

account:
  initial_balance: 100000
  currency: "USD"
  leverage: 100

prop_rules:
  profit_target_phase1: 0.08
  profit_target_phase2: 0.05
  max_daily_drawdown: 0.05
  max_total_drawdown: 0.10
  min_trading_days: 5

risk:
  risk_per_trade: 0.005       # 0.5%
  max_daily_loss: 0.02        # 2% self-imposed
  max_concurrent_trades: 1    # فقط ۱ معامله باز (ساده‌تر و امن‌تر)
  reward_to_risk: 3.0         # فقط برای fallback

strategy:
  htf_minutes: 60
  mtf_minutes: 15
  ltf_minutes: 5
  
  swing_lookback: 20
  sweep_threshold_pips: 2
  sweep_max_candles: 3
  structure_lookback: 50
  bos_min_pips: 5
  fvg_min_size_pips: 1
  
  london_start: 7
  london_end: 12
  newyork_start: 12
  newyork_end: 17
  trade_sessions: true
  
  sl_buffer_pips: 2
  use_trailing_stop: true     # ← فعال شد
  breakeven_at_1r: false      # ← غیرفعال شد

execution:
  spread_pips: 1.2            # ← کمی واقعی‌تر
  slippage_pips: 0.3
  commission_per_lot: 7.0

output:
  save_trades: true
  save_equity_curve: true
  save_charts: true
  output_directory: "./results"
  detailed_log: true
