name: Fast Backtest

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 30   # حالا ۳۰ دقیقه کافیه نه ۱۲۰

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install deps
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Check data
      run: |
        echo "Data files:"
        ls -la data/DAT_ASCII_*.csv 2>/dev/null | wc -l
        echo "files found"

    - name: Run Backtest
      run: python run_backtest.py

    - name: Upload Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: backtest-results
        path: results/
        retention-days: 30
