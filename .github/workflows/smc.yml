name: Backtest

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - run: pip install pandas numpy matplotlib seaborn tabulate pyyaml

    - run: python backtest_fast.py

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: results
        path: results/
        retention-days: 30
