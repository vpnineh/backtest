name: Run Backtest

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Manual trigger

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        lfs: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Verify data files exist
      run: |
        echo "=== Checking data directory ==="
        ls -la data/ | head -20
        echo "..."
        echo "Total files: $(ls data/ | wc -l)"

    - name: Run Backtest
      run: |
        python run_backtest.py

    - name: Upload Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: backtest-results
        path: |
          results/
        retention-days: 30

    - name: Display Results Summary
      if: always()
      run: |
        echo "=== BACKTEST RESULTS ==="
        if [ -f results/trades.csv ]; then
          echo "Total trades: $(wc -l < results/trades.csv)"
          echo ""
          echo "First 20 trades:"
          head -21 results/trades.csv | column -t -s','
        else
          echo "No trades file found"
        fi
