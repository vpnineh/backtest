name: PropBot Backtest

on:
  workflow_dispatch:

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas numpy matplotlib

      - name: Run backtest
        run: python backtest.py --data-dir data --out-dir results

      - name: Print report
        if: always()
        run: |
          if [ -f results/report.txt ]; then
            cat results/report.txt
          else
            echo "report.txt not found"
          fi

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: propbot-results-${{ github.run_number }}
          path: results/
          retention-days: 30
