# ─────────────────────────────────────────────────────────────────────────────
#  PropBot Backtester — GitHub Actions Workflow
#  Trigger  : manually (workflow_dispatch)  OR push to main/backtest branch
#  Runtime  : ubuntu-latest + Python 3.11
#  Output   : results/ uploaded as artifact (report.txt, equity CSVs, charts)
# ─────────────────────────────────────────────────────────────────────────────

name: PropBot Backtest

on:
  # ── manual trigger (most common — press "Run workflow" in Actions tab) ──
  workflow_dispatch:
    inputs:
      pairs:
        description: "Pairs to test (comma-separated, blank = all detected)"
        required: false
        default: ""
      data_dir:
        description: "Subdirectory containing the CSV/ZIP data files"
        required: false
        default: "data"

  # ── auto trigger on push to these branches ──
  push:
    branches:
      - main
      - backtest
    paths:
      - "backtest.py"
      - ".github/workflows/backtest.yml"

jobs:
  backtest:
    name: Run PropBot Backtest
    runs-on: ubuntu-latest
    timeout-minutes: 60       # M1 data for 10 pairs × 15 years is heavy

    steps:
      # ── 1. Checkout repo ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: false           # set to true if you store data in Git LFS

      # ── 2. Set up Python ────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Cache pip packages ───────────────────────────────────────────
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-backtest.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── 4. Install dependencies ─────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy matplotlib

      # ── 5. Verify data files ────────────────────────────────────────────
      - name: Show available data files
        run: |
          echo "=== Data files in repo ==="
          DATA_DIR="${{ github.event.inputs.data_dir || 'data' }}"
          find "$DATA_DIR" \( -name "DAT_ASCII_*.csv" -o -name "HISTDATA_COM_ASCII_*.zip" \) \
            | sort | head -40
          echo ""
          echo "Total CSV : $(find "$DATA_DIR" -name 'DAT_ASCII_*.csv' | wc -l)"
          echo "Total ZIP : $(find "$DATA_DIR" -name 'HISTDATA_COM_ASCII_*.zip' | wc -l)"

      # ── 6. Run backtest ─────────────────────────────────────────────────
      - name: Run PropBot Backtest
        run: |
          python backtest.py \
            --data-dir "${{ github.event.inputs.data_dir || 'data' }}" \
            --out-dir  results \
            --pairs    "${{ github.event.inputs.pairs || '' }}"

      # ── 7. Print report to Actions log ──────────────────────────────────
      - name: Print summary report
        if: always()
        run: |
          echo "══════════════════════════════════════════════"
          echo "  BACKTEST REPORT"
          echo "══════════════════════════════════════════════"
          if [ -f results/report.txt ]; then
            cat results/report.txt
          else
            echo "[ERROR] results/report.txt not found"
          fi

      # ── 8. Print per-pair trade counts ───────────────────────────────────
      - name: Trade counts per pair
        if: always()
        run: |
          echo ""
          echo "── Trade files generated ──"
          ls -lh results/trades_*.csv 2>/dev/null || echo "None"

      # ── 9. Upload all results as artifact ───────────────────────────────
      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        if: always()           # upload even if backtest partially fails
        with:
          name: propbot-results-${{ github.run_number }}
          path: results/
          retention-days: 30   # keep artifacts for 30 days

      # ── 10. Fail the job if report shows poor OOS results ───────────────
      #        (comment out if you want CI to always pass)
      - name: Validate OOS results
        run: |
          python - <<'EOF'
          import json, sys
          try:
              with open("results/summary.json") as f:
                  data = json.load(f)
          except FileNotFoundError:
              print("[WARN] summary.json not found — skipping validation")
              sys.exit(0)

          issues = []
          for pair_data in data:
              oos = pair_data.get("oos", {})
              pair = pair_data.get("pair", "?")
              dd = oos.get("max_dd_pct", 0)
              pf = oos.get("profit_factor", 0)
              trades = oos.get("trades", 0)

              if trades > 20 and dd > 7:
                  issues.append(f"  ⚠  {pair}: OOS Max DD = {dd:.1f}% (exceeds 7% prop limit)")
              if trades > 20 and pf < 0.8:
                  issues.append(f"  ⚠  {pair}: OOS Profit Factor = {pf:.2f} (very low)")

          if issues:
              print("\n[WARNING] The following pairs have concerning OOS metrics:")
              for i in issues:
                  print(i)
              print("\n  → Review strategy before live deployment.")
              # sys.exit(1)  # uncomment to FAIL the CI job on poor results
          else:
              print("[OK] All pairs passed OOS validation checks.")
          EOF
