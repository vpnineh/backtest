name: 2-Years MVP Backtest (M15, M5, M2, M1)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  # ══════════════════ جاب ۱: دانلود ══════════════════
  download-data:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Requirements
        run: pip install pandas numpy

      - name: Restore Cache
        id: cache-data
        uses: actions/cache/restore@v4
        with:
          path: ./data
          key: dukascopy-eurusd-gbpusd-2022-2024-v6

      - name: Cache Status
        run: |
          echo "Cache hit: ${{ steps.cache-data.outputs.cache-hit }}"
          ls -lah ./data/ 2>/dev/null || echo "پوشه data خالی"

      - name: Download Market Data
        if: steps.cache-data.outputs.cache-hit != 'true'
        run: python download_dukascopy.py

      - name: Verify Data
        run: |
          echo "=== بررسی فایل‌ها ==="
          ls -lah ./data/

          FILE_COUNT=$(ls ./data/*.csv 2>/dev/null | wc -l)
          echo "تعداد CSV: $FILE_COUNT"

          if [ "$FILE_COUNT" -lt 2 ]; then
            echo "❌ فایل کافی نیست!"
            exit 1
          fi

          for f in ./data/*.csv; do
            lines=$(wc -l < "$f")
            size=$(du -sh "$f" | cut -f1)
            echo "✅ $f | $lines خط | $size"
            if [ "$lines" -lt 10000 ]; then
              echo "❌ فایل $f خیلی کوچک!"
              exit 1
            fi
          done

          echo "✅ همه فایل‌ها سالم"

      - name: Save Cache
        if: steps.cache-data.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ./data
          key: dukascopy-eurusd-gbpusd-2022-2024-v6

  # ══════════════════ جاب ۲: بک‌تست ══════════════════
  run-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: download-data

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Requirements
        run: pip install pandas numpy

      - name: Restore Data Cache
        id: cache-data
        uses: actions/cache/restore@v4
        with:
          path: ./data
          key: dukascopy-eurusd-gbpusd-2022-2024-v6

      - name: Verify Cache
        run: |
          echo "Cache hit: ${{ steps.cache-data.outputs.cache-hit }}"
          ls -lah ./data/
          if [ -z "$(ls ./data/*.csv 2>/dev/null)" ]; then
            echo "❌ کش restore نشد!"
            exit 1
          fi

      - name: Run Backtest
        run: python dukascopy_mtf_optimizer.py

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: MVP-2Years-MTF-Report
          path: ultimate_5years_mtf_report.csv
          retention-days: 30
