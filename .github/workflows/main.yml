name: 2-Years MVP Backtest (M15, M5, M2, M1)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  dukascopy-quant-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python Requirements
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy

      # کش بر اساس بازه زمانی - نیازی به Node.js نیست
      - name: Cache Dukascopy Data
        id: cache-data
        uses: actions/cache@v4
        with:
          path: ./data
          key: dukascopy-raw-eurusd-gbpusd-2022-2024-v5

      # دانلود مستقیم با Python خالص - بدون وابستگی خارجی
      - name: Download Market Data
        if: steps.cache-data.outputs.cache-hit != 'true'
        run: |
          python download_dukascopy.py

      - name: Verify Data
        run: |
          echo "=== فایل‌های دانلود شده ==="
          ls -lah ./data/
          
          # چک تعداد خطوط
          for f in ./data/*.csv; do
            lines=$(wc -l < "$f")
            echo "$f : $lines خط"
          done

      - name: Run Python MTF Optimizer
        run: python dukascopy_mtf_optimizer.py

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: MVP-2Years-MTF-Report
          path: ultimate_5years_mtf_report.csv
          retention-days: 7
