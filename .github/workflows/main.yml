name: 2-Years MVP Backtest (M15, M5, M2, M1)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  dukascopy-quant-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python Requirements
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy

      - name: Install Dukascopy-Node
        run: npm install -g dukascopy-node

      # کش با کلید روزانه برای جلوگیری از استفاده از کش قدیمی
      - name: Cache Dukascopy Data
        id: cache-data
        uses: actions/cache@v4
        with:
          path: ./data
          key: dukascopy-m1-eurusd-gbpusd-2022-2024-v3-${{ runner.os }}
          restore-keys: |
            dukascopy-m1-eurusd-gbpusd-2022-2024-v3-

      - name: Download Data with Retry & Chunks
        if: steps.cache-data.outputs.cache-hit != 'true'
        run: |
          mkdir -p data
          
          download_chunk() {
            local instrument=$1
            local from=$2
            local to=$3
            local max_attempts=5
            local attempt=1
            
            while [ $attempt -le $max_attempts ]; do
              echo ">>> $instrument | $from → $to | تلاش $attempt"
              
              dukascopy-node \
                --instrument $instrument \
                --timeframe m1 \
                --date-from $from \
                --date-to $to \
                --format csv \
                --directory ./data \
                --debug
              
              if [ $? -eq 0 ]; then
                echo "✅ موفق: $instrument $from → $to"
                return 0
              fi
              
              local wait_time=$((attempt * 20))
              echo "⚠️ ناموفق، $wait_time ثانیه صبر..."
              sleep $wait_time
              attempt=$((attempt + 1))
            done
            
            echo "❌ خطا: $instrument $from → $to پس از $max_attempts تلاش"
            return 1
          }
          
          # لیست بازه‌های زمانی
          CHUNKS=(
            "2022-01-01 2022-04-01"
            "2022-04-01 2022-07-01"
            "2022-07-01 2022-10-01"
            "2022-10-01 2023-01-01"
            "2023-01-01 2023-04-01"
            "2023-04-01 2023-07-01"
            "2023-07-01 2023-10-01"
            "2023-10-01 2024-01-01"
          )
          
          for instrument in eurusd gbpusd; do
            echo "=============================="
            echo "شروع دانلود: $instrument"
            echo "=============================="
            
            for chunk in "${CHUNKS[@]}"; do
              from=$(echo $chunk | cut -d' ' -f1)
              to=$(echo $chunk | cut -d' ' -f2)
              
              download_chunk $instrument $from $to
              
              if [ $? -ne 0 ]; then
                echo "❌ دانلود $instrument کامل نشد!"
                exit 1
              fi
              
              # تاخیر بین chunk ها
              sleep 5
            done
            
            # تاخیر بین instrument ها
            sleep 15
          done
          
          echo "=============================="
          echo "✅ همه دانلودها کامل شد"
          ls -lah ./data/
          du -sh ./data/

      - name: Verify Downloaded Data
        run: |
          echo "=== بررسی فایل‌های دانلود شده ==="
          ls -lah ./data/
          
          # چک وجود فایل‌ها
          if [ -z "$(ls -A ./data/)" ]; then
            echo "❌ خطا: پوشه data خالی است!"
            exit 1
          fi
          
          echo "✅ داده‌ها موجود هستند"

      - name: Run Python MTF Optimizer
        run: python dukascopy_mtf_optimizer.py

      - name: Upload Final Results
        uses: actions/upload-artifact@v4
        with:
          name: MVP-2Years-MTF-Report
          path: ultimate_5years_mtf_report.csv
          retention-days: 7
