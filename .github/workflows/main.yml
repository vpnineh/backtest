name: Real-World Portfolio Simulator

on:
  workflow_dispatch:

jobs:
  run-simulator:
    runs-on: ubuntu-latest
    timeout-minutes: 20 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Quant Libraries
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy statsmodels

      - name: Run Real-World Simulator
        run: python realworld_quantsim.py

      - name: Upload Equity Curve
        uses: actions/upload-artifact@v4
        with:
          name: RealWorld-5000-USD-Report
          path: Equity_Curve_Report.csv
          retention-days: 30
