name: HistData Quant Backtest

on:
  workflow_dispatch: # فقط با دکمه دستی استارت می‌شود

jobs:
  run-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 20 # زمان کافی برای پردازش ۵ سال دیتا

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy

      - name: Verify Data Directory
        run: |
          echo "=== بررسی فایل‌های موجود در پوشه دیتا ==="
          ls -lah ./data/ || echo "❌ هشدار: پوشه data پیدا نشد!"
          echo "========================================="

      - name: Run MTF Optimizer
        run: python dukascopy_mtf_optimizer.py

      - name: Upload Final Report
        uses: actions/upload-artifact@v4
        with:
          name: HistData-MTF-Report
          path: ultimate_histdata_mtf_report.csv
          retention-days: 30 # فایل خروجی تا یک ماه در گیت‌هاب باقی می‌ماند
