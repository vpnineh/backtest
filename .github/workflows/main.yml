name: Pairs Trading Bot Pipeline

on:
  workflow_dispatch: # امکان اجرای دستی را فراهم می‌کند
  push:
    branches:
      - main # هر بار که کد روی شاخه اصلی پوش شود اجرا می‌گردد

jobs:
  run-statistical-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ----------------- مرحله اول: پیدا کردن جفت‌های همگرا -----------------
      - name: Run Cointegration Script
        run: python cointegration_finder.py
        
      - name: Upload Cointegrated Pairs Report
        uses: actions/upload-artifact@v4
        with:
          name: Cointegrated-Pairs-Report
          path: cointegrated_pairs_report.csv
          retention-days: 7

      # ----------------- مرحله دوم: بک‌تست استراتژی روزانه -----------------
      - name: Run Backtester Script
        run: python zscore_backtester.py

      - name: Upload Backtest Image
        uses: actions/upload-artifact@v4
        with:
          name: Backtest-Result-Chart
          path: eur_gbp_backtest.png
          retention-days: 7

      # ----------------- مرحله سوم: بهینه‌سازی (Grid Search) -----------------
      - name: Run Optimizer Script
        run: python zscore_optimizer.py

      - name: Upload Optimized Results
        uses: actions/upload-artifact@v4
        with:
          name: Optimized-Parameters
          path: multi_timeframe_optimization.csv
          retention-days: 7
