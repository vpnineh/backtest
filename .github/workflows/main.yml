name: 5-Years Ultimate Backtest (M15, M5, M2, M1)

on:
  workflow_dispatch: # برای اجرای دستی از پنل گیت‌هاب
  push:
    branches:
      - main

jobs:
  dukascopy-quant-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js (For Dukascopy Downloader)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python Requirements
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy

      # ----------------- سیستم هوشمند کش دیتا -----------------
      - name: Cache Dukascopy Data
        id: cache-data
        uses: actions/cache@v4
        with:
          path: ./data
          # اگر زمانی خواستید تاریخ را عوض کنید، این نام را تغییر دهید تا کش رفرش شود
          key: dukascopy-m1-eurusd-gbpusd-2019-2024-v1

      # ----------------- مرحله اول: دانلود ایمن (عبور از فایروال) -----------------
      # ----------------- مرحله اول: دانلود ایمن (عبور از فایروال) -----------------
      - name: Download 5-Year M1 Data from Dukascopy
        if: steps.cache-data.outputs.cache-hit != 'true'
        run: |
          mkdir -p data
          # استفاده از فلگ‌های کامل برای جلوگیری از تداخل
          npx dukascopy-node -i eurusd -t m1 -from 2019-01-01 -to 2024-01-01 -f csv -dir ./data --debug --batch-size 5 --retries 10 --pause 500
          npx dukascopy-node -i gbpusd -t m1 -from 2019-01-01 -to 2024-01-01 -f csv -dir ./data --debug --batch-size 5 --retries 10 --pause 500
      # ----------------- مرحله دوم: اجرای پردازشگر پایتون -----------------
      - name: Run Python MTF Optimizer
        run: python dukascopy_mtf_optimizer.py

      # ----------------- مرحله سوم: ذخیره نتایج -----------------
      - name: Upload Final Optimization Results
        uses: actions/upload-artifact@v4
        with:
          name: Ultimate-5Years-MTF-Report
          path: ultimate_5years_mtf_report.csv
          retention-days: 7
