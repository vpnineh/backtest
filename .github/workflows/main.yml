name: Forex Backtester

on:
  workflow_dispatch:
    inputs:
      symbol:
        description: 'Symbol'
        required: false
        default: 'EURUSD'
        type: choice
        options:
          - EURUSD
          - GBPUSD
          - AUDUSD
          - USDCAD
          - USDCHF
          - NZDUSD
          - AUDNZD
          - EURGBP
          - XAUUSD
          - XAGUSD

      timeframe:
        description: 'Timeframe'
        required: false
        default: 'H1'
        type: choice
        options:
          - M5
          - M15
          - H1
          - H4
          - D1

      run_all_symbols:
        description: 'Run ALL symbols?'
        required: false
        default: false
        type: boolean

      walk_forward:
        description: 'Walk-Forward Validation?'
        required: false
        default: false
        type: boolean

jobs:
  backtest:
    name: Run Backtest [${{ inputs.symbol }} / ${{ inputs.timeframe }}]
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install numpy pandas matplotlib

      - name: Create output directory
        run: mkdir -p backtest_results

      - name: Show available data files
        run: |
          echo "=== data/ ==="
          ls -lh data/

      - name: Run backtest
        run: |
          ARGS="--symbol ${{ inputs.symbol }} --timeframe ${{ inputs.timeframe }}"
          [ "${{ inputs.run_all_symbols }}" = "true" ] && ARGS="$ARGS --all"
          [ "${{ inputs.walk_forward }}"   = "true" ] && ARGS="$ARGS --wf"
          echo "Running: python backtest.py $ARGS"
          python backtest.py $ARGS

      - name: Show log
        if: always()
        run: cat backtest_results/backtest.log || echo "no log"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-${{ inputs.symbol }}-${{ inputs.timeframe }}-run${{ github.run_number }}
          path: backtest_results/
          if-no-files-found: warn
          retention-days: 30
