name: 5-Years MVP Backtest (M15, M5, M2, M1)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  download-data:
    runs-on: ubuntu-latest
    timeout-minutes: 100

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Requirements
        run: pip install pandas numpy

      - name: Restore Cache
        id: cache-data
        uses: actions/cache/restore@v4
        with:
          path: ./data
          key: dukascopy-eurusd-gbpusd-2021-2026-v1

      - name: Download Market Data
        if: steps.cache-data.outputs.cache-hit != 'true'
        run: python download_dukascopy.py

      - name: Verify Data
        run: |
          ls -lah ./data/
          for f in ./data/*.csv; do
            lines=$(wc -l < "$f")
            size=$(du -sh "$f" | cut -f1)
            echo "$f | $lines خط | $size"
          done

      - name: Save Cache
        if: steps.cache-data.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ./data
          key: dukascopy-eurusd-gbpusd-2021-2026-v1

  debug-csv:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: download-data

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Requirements
        run: pip install pandas numpy

      - name: Restore Cache
        uses: actions/cache/restore@v4
        with:
          path: ./data
          key: dukascopy-eurusd-gbpusd-2021-2026-v1

      - name: Debug Raw CSV Content
        run: |
          python - <<'EOF'
          import pandas as pd
          import os

          path = 'data/EURUSD_M1_20210101_20260101.csv'

          print(f"حجم فایل: {os.path.getsize(path)/1024/1024:.1f} MB")
          print()
          print("=== 20 خط اول خام ===")
          with open(path, 'r') as f:
              for i, line in enumerate(f):
                  print(repr(line.strip()))
                  if i >= 20:
                      break

          print()
          print("=== pandas read ===")
          df = pd.read_csv(path, nrows=20)
          print(df.to_string())
          print()
          print(f"نوع ستون timestamp: {df['timestamp'].dtype}")

          df['timestamp'] = pd.to_datetime(df['timestamp'])
          print(f"ساعت‌های یکتا در 20 ردیف: {df['timestamp'].dt.hour.unique().tolist()}")
          print(f"دقیقه‌های یکتا در 20 ردیف: {df['timestamp'].dt.minute.unique().tolist()}")
          print(f"نمونه timestamp پارس شده: {df['timestamp'].iloc[0]}")
          EOF
