name: Pairs Trading Cointegration Finder

on:
  workflow_dispatch: # امکان اجرای دستی را فراهم می‌کند
  push:
    branches:
      - main # هر بار که کد روی شاخه اصلی پوش شود اجرا می‌گردد

jobs:
  run-statistical-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Cointegration Script
        run: python cointegration_finder.py

      - name: Upload Results as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cointegrated-Pairs-Report
          path: cointegrated_pairs_report.csv
          retention-days: 7
