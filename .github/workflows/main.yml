name: 5-Years Ultimate Backtest (M15, M5, M2, M1)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  dukascopy-quant-pipeline:
    runs-on: ubuntu-latest
    
    # افزایش timeout برای دانلود ۵ ساله
    timeout-minutes: 360

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js (For Dukascopy Downloader)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python Requirements
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy

      # نصب صریح پکیج (بدون دستورات اضافی که باعث باگ می‌شوند)
      - name: Install Dukascopy-Node
        run: |
          npm install -g dukascopy-node

      # ----------------- سیستم هوشمند کش دیتا -----------------
      - name: Cache Dukascopy Data
        id: cache-data
        uses: actions/cache@v4
        with:
          path: ./data
          key: dukascopy-m1-eurusd-gbpusd-2019-2024-v3

      # ----------------- دانلود داده (فقط اگر کش نداشت) -----------------
      - name: Download 5-Year M1 Data from Dukascopy
        if: steps.cache-data.outputs.cache-hit != 'true'
        run: |
          mkdir -p data
          
          echo "=== شروع دانلود EURUSD M1 (۵ سال) ==="
          dukascopy-node \
            --instrument eurusd \
            --timeframe m1 \
            --date-from 2019-01-01 \
            --date-to 2024-01-01 \
            --format csv \
            --directory ./data \
            --debug
          
          echo "=== شروع دانلود GBPUSD M1 (۵ سال) ==="
          dukascopy-node \
            --instrument gbpusd \
            --timeframe m1 \
            --date-from 2019-01-01 \
            --date-to 2024-01-01 \
            --format csv \
            --directory ./data \
            --debug
          
          echo "=== بررسی فایل‌های دانلود شده ==="
          ls -lah ./data/
          du -sh ./data/

      # ----------------- مرحله دوم: پردازش پایتون -----------------
      - name: Run Python MTF Optimizer
        run: python dukascopy_mtf_optimizer.py

      # ----------------- مرحله سوم: ذخیره نتایج -----------------
      - name: Upload Final Optimization Results
        uses: actions/upload-artifact@v4
        with:
          name: Ultimate-5Years-MTF-Report
          path: ultimate_5years_mtf_report.csv
          retention-days: 7
