name: Real-World Portfolio Simulator

on:
  workflow_dispatch:

jobs:
  run-simulator:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Libraries
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy

      - name: Run Simulator
        run: python realworld_quantsim.py

      - name: Upload Full Report
        uses: actions/upload-artifact@v4
        with:
          name: Prop-Backtest-Report
          path: |
            Equity_Curve_Report.csv
            trades_detail.csv
            equity_curve.csv
            monthly_report.csv
            yearly_report.csv
          retention-days: 30
