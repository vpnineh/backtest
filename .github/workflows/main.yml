name: 5-Years Ultimate Quant Backtest

on:
  workflow_dispatch:

jobs:
  run-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 30 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Quant Libraries
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy numba

      - name: Run Advanced MTF Optimizer
        run: python dukascopy_mtf_optimizer.py

      - name: Upload Final 5-Years Report
        uses: actions/upload-artifact@v4
        with:
          name: 5Years-Advanced-MTF-Report
          path: ultimate_5years_advanced_report.csv
          retention-days: 30
