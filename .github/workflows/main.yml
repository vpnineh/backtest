name: 5-Strategies Arena Backtest

on:
  workflow_dispatch:

jobs:
  run-arena:
    runs-on: ubuntu-latest
    timeout-minutes: 20 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Quant Libraries
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy

      - name: Run Multi-Strategy Engine
        run: python multi_strategy_engine.py

      - name: Upload Arena Results
        uses: actions/upload-artifact@v4
        with:
          name: 5-Strategies-Arena-Report
          path: Ultimate_5_Strategies_Arena.csv
          retention-days: 30
