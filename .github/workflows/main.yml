name: 1-Year MVP Backtest

on:
  workflow_dispatch:

jobs:
  quant-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests

      - name: Cache Market Data
        id: cache-data
        uses: actions/cache@v4
        with:
          path: ./data
          key: dukascopy-eurusd-gbpusd-2023-2024-v1

      - name: Download Market Data
        if: steps.cache-data.outputs.cache-hit != 'true'
        run: python download_dukascopy.py

      - name: Verify Downloaded Data
        run: |
          echo "=== بررسی فایل‌های موجود ==="
          ls -lah ./data/
          for f in ./data/*.csv; do
            lines=$(wc -l < "$f")
            echo "$f | $lines خط"
            if [ "$lines" -lt 100000 ]; then
              echo "❌ فایل بسیار کوچک است! دانلود با خطا مواجه شده."
              exit 1
            fi
          done

      - name: Run Optimizer
        run: python dukascopy_mtf_optimizer.py

      - name: Upload Final Report
        uses: actions/upload-artifact@v4
        with:
          name: MVP-1Year-Report
          path: ultimate_1year_mtf_report.csv
          retention-days: 14
