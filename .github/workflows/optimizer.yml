name: CorrArb Prop Optimizer

on:
  push:
    branches:
      - main
    paths:
      - 'optimizer.py'
  # امکان اجرای دستی از تب Actions
  workflow_dispatch: 

jobs:
  run-optimization:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # کش کردن پکیج‌ها برای سرعت بیشتر در اجراهای بعدی

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy

      - name: 🚀 Run Grid Search Optimizer
        run: python ml_optimizer.py
